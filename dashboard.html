<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .tech-mono {
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* Custom glow effects matching video's aura */
        .neon-glow-gold {
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.08), inset 0 0 15px rgba(234, 179, 8, 0.03);
        }
        .neon-border {
            border: 1px solid rgba(234, 179, 8, 0.15);
        }
        .neon-border-glow:hover {
            border-color: rgba(234, 179, 8, 0.5);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.15);
        }

        /* Custom keyframes for a clean, elastic popping entry effect */
        @keyframes popInEffect {
            0% { 
                transform: scale(0.92); 
                opacity: 0; 
            }
            70% { 
                transform: scale(1.02); 
                opacity: 0.9; 
            }
            100% { 
                transform: scale(1); 
                opacity: 1; 
            }
        }

        .animate-pop {
            animation: popInEffect 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body class="bg-[#08080c] text-gray-200 min-h-screen pb-12 relative overflow-x-hidden">

    <!-- Ambient Grid & Neon Blur Background Elements -->
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(234,179,8,0.015),transparent_60%)] pointer-events-none"></div>
    <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-yellow-500/5 rounded-full blur-[140px] pointer-events-none"></div>

    <!-- Navigation Header -->
    <nav class="bg-[#0c0d12]/90 backdrop-blur-md border-b border-gray-900 px-4 py-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></span>
                <h1 class="text-md font-bold tracking-[0.2em] text-white uppercase tech-mono">TRADESCROW // DB</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userBadge" class="text-[10px] text-yellow-500/80 border border-yellow-500/20 px-3 py-1 bg-yellow-500/5 font-mono tracking-wider rounded-none">...</span>
                <button onclick="handleLogout()" class="text-[10px] text-red-400 hover:text-red-500 uppercase tracking-widest font-semibold transition tech-mono">Logout_</button>
            </div>
        </div>
    </nav>

    <!-- 3-Column Mobile App Navigation Bar (HUD styled) -->
    <div class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-3 gap-2.5 text-[10px] sm:text-xs tech-mono uppercase tracking-widest">
        <a href="dashboard.html" class="bg-[#12131a] border border-yellow-500/60 text-yellow-500 text-center py-3 font-bold shadow-md shadow-yellow-500/5">
            [ 💼 ESCROW TRADES ]
        </a>
        <a href="market.html" class="bg-[#0c0d12]/60 hover:bg-[#12131a] text-gray-500 hover:text-gray-200 text-center py-3 font-bold border border-gray-900 transition duration-300">
            🛒 MARKETPLACE
        </a>
        <a href="chat.html" class="bg-[#0c0d12]/60 hover:bg-[#12131a] text-gray-500 hover:text-gray-200 text-center py-3 font-bold border border-gray-900 transition duration-300">
            💬 GLOBAL CHAT
        </a>
    </div>

    <!-- Sequential Popping Testimony Panel Container (Styled like live terminal notifications) -->
    <div class="max-w-4xl mx-auto px-4 mt-6 h-[46px] flex justify-center items-center">
        <div id="testimonyBox" class="bg-[#0e0f14]/80 backdrop-blur-md border border-gray-900 rounded-xl px-5 py-2.5 text-xs flex items-center gap-2.5 w-full max-w-lg shadow-sm animate-pop">
            <span id="testimonyEmoji" class="text-base select-none">🤝</span>
            <p class="text-gray-400 flex-1 truncate tech-mono uppercase text-[10px] tracking-wider">
                <span id="testimonyText">"Exchanged my IG page in 5 mins safely!"</span> 
                <span id="testimonyAuthor" class="text-yellow-500/60 font-medium ml-1.5">- @chidi_crypto</span>
            </p>
        </div>
    </div>

    <!-- Main Workspace Dashboard content panel -->
    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-lg font-black text-white uppercase tracking-wider">Your Escrow Agreements</h2>
                <p class="text-[11px] text-gray-500 tracking-wide">Track incoming and outgoing digital asset transactions on-chain.</p>
            </div>
            <a href="create.html" class="tech-mono bg-yellow-500 hover:bg-yellow-600 text-black font-black px-5 py-3 text-[10px] tracking-widest uppercase transition duration-300 shadow-lg shadow-yellow-500/10">
                + New Contract [→]
            </a>
        </div>

        <!-- Dynamic List Container Box -->
        <div id="contractsList" class="space-y-4">
            <div class="text-center py-16 bg-[#0e0f14]/80 backdrop-blur-xl border border-gray-950 rounded-3xl">
                <span class="animate-spin inline-block w-6 h-6 border-2 border-yellow-500 border-t-transparent rounded-full mb-3"></span>
                <p class="text-[10px] tracking-widest text-gray-500 uppercase tech-mono">Querying live contract data registry...</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeUser = null;

        // --- Testimony Databank & Animation Engine ---
        const testimonials = [
            { emoji: "🤝", text: '"Exchanged my IG page in 5 mins safely!"', author: "- @chidi_crypto" },
            { emoji: "🔒", text: '"The escrow lock mechanism is bulletproof."', author: "- @olu_dev" },
            { emoji: "🎮", text: '"Safest P2P account portal in Nigeria ₦"', author: "- @bisi_trades" },
            { emoji: "😁", text: '"Saved me from a notorious online scammer today."', author: "- @tunde_X" }
        ];
        
        let currentTestimonyIndex = 0;
        const testimonyBox = document.getElementById('testimonyBox');
        const testimonyEmoji = document.getElementById('testimonyEmoji');
        const testimonyText = document.getElementById('testimonyText');
        const testimonyAuthor = document.getElementById('testimonyAuthor');

        function cycleTestimonials() {
            testimonyBox.classList.remove('animate-pop');
            void testimonyBox.offsetWidth; // Force Reflow
            
            currentTestimonyIndex = (currentTestimonyIndex + 1) % testimonials.length;
            const currentItem = testimonials[currentTestimonyIndex];
            
            testimonyEmoji.innerText = currentItem.emoji;
            testimonyText.innerText = currentItem.text;
            testimonyAuthor.innerText = currentItem.author;
            
            testimonyBox.classList.add('animate-pop');
        }

        setInterval(cycleTestimonials, 4000);

        // --- Secure Session Check & Data Load Engine ---
        async function checkSecureAuth() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();

            if (error || !session) {
                window.location.href = 'index.html';
                return;
            }

            activeUser = session.user.email;
            document.getElementById('userBadge').innerText = activeUser;

            fetchUserContracts();
        }

        async function fetchUserContracts() {
            if (!activeUser) return;
            const listContainer = document.getElementById('contractsList');

            const { data, error } = await supabaseClient
                .from('trade')
                .select('*')
                .or(`buyer_email.eq.${activeUser},seller_email.eq.${activeUser}`)
                .order('created_at', { ascending: false });

            if (error) {
                listContainer.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-none text-xs text-center tech-mono uppercase tracking-widest">Sync Error: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-16 bg-[#0e0f14]/80 backdrop-blur-xl border border-gray-900 rounded-3xl px-4 relative overflow-hidden">
                        <div class="absolute top-2 left-2 tech-mono text-[8px] text-gray-600">[ TRD_EMPTY ]</div>
                        <p class="text-sm font-bold text-gray-300 uppercase tracking-wider">No active contracts found</p>
                        <p class="text-[11px] text-gray-500 mt-1 mb-6">You haven't initialized or joined any secure escrow rooms yet.</p>
                        <a href="create.html" class="inline-block tech-mono bg-[#12131a] hover:bg-[#181922] text-yellow-500 hover:text-yellow-400 text-[10px] tracking-widest uppercase px-5 py-3 border border-yellow-500/30 hover:border-yellow-500 transition duration-300">
                            Create First Contract [→]
                        </a>
                    </div>`;
                return;
            }

            listContainer.innerHTML = ""; 
            
            data.forEach(trade => {
                const isBuyer = trade.buyer_email.toLowerCase() === activeUser.toLowerCase();
                const roleBadge = isBuyer ? 
                    '<span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 tech-mono">Buyer</span>' : 
                    '<span class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 tech-mono">Seller</span>';
                
                let statusBadge = '';
                if(trade.status === 'pending') statusBadge = '<span class="text-yellow-500/80 font-medium tracking-wider text-[11px] uppercase">Awaiting Deposit</span>';
                if(trade.status === 'paid') statusBadge = '<span class="text-green-400 font-medium animate-pulse tracking-wider text-[11px] uppercase">🔒 Escrow Locked</span>';
                if(trade.status === 'released') statusBadge = '<span class="text-gray-500 font-medium tracking-wider text-[11px] uppercase">Settle Closed</span>';
                if(trade.status === 'disputed') statusBadge = '<span class="text-red-400 font-bold tracking-wider text-[11px] uppercase">🛑 Disputed Order</span>';

                const card = document.createElement('div');
                card.className = "bg-[#0e0f14]/85 backdrop-blur-xl border border-gray-900 rounded-2xl p-5 shadow-lg neon-border-glow transition duration-300 cursor-pointer flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 relative overflow-hidden";
                card.onclick = () => window.location.href = `room.html?id=${trade.id}`;
                
                card.innerHTML = `
                    <div class="space-y-2 flex-1">
                        <div class="flex items-center gap-3">
                            <h3 class="font-black text-white text-md uppercase tracking-wider">${trade.asset_type}</h3>
                            ${roleBadge}
                        </div>
                        <p class="text-[10px] text-gray-500 font-mono tracking-tight break-all uppercase">// Partner: ${isBuyer ? trade.seller_email : trade.buyer_email}</p>
                    </div>
                    <div class="flex sm:flex-col justify-between items-end w-full sm:w-auto border-t sm:border-0 border-gray-900/60 pt-3 sm:pt-0 tech-mono">
                        <span class="text-md font-black text-green-400 tracking-wider">₦${trade.amount.toLocaleString()}</span>
                        <span class="text-xs mt-1">${statusBadge}</span>
                    </div>
                    <div class="absolute bottom-2 left-2 tech-mono text-[7px] text-gray-800">ROOM_ID: ${trade.id.substring(0,8).toUpperCase()}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        checkSecureAuth();
    </script>
</body>
</html>
