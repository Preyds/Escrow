<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <!-- Navigation Header -->
    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-yellow-500 tracking-wide">🎮 Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="userBadge" class="text-xs text-gray-400 border border-gray-700 px-3 py-1 rounded-xl bg-gray-950 font-mono">...</span>
                <button onclick="handleLogout()" class="text-xs text-red-400 hover:text-red-500 font-semibold transition">Logout</button>
            </div>
        </div>
    </nav>

    <!-- App Features Navigation Tabs -->
    <div class="max-w-4xl mx-auto px-4 mt-6 grid grid-cols-2 gap-2">
        <a href="dashboard.html" class="bg-gray-800 border border-yellow-500/30 text-yellow-500 text-center py-2.5 rounded-xl font-bold text-xs shadow-md">💼 My Escrow Trades</a>
        <a href="chat.html" class="bg-gray-800/50 hover:bg-gray-800 text-gray-400 text-center py-2.5 rounded-xl font-bold text-xs border border-gray-700 transition">💬 Global Hub Chat</a>
    </div>

    <!-- Main Workspace Dashboard content panel -->
    <main class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-lg font-bold text-white">Your Escrow Agreements</h2>
                <p class="text-xs text-gray-400">Track incoming and outgoing digital asset transactions.</p>
            </div>
            <a href="create.html" class="bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold px-4 py-2.5 rounded-xl text-xs transition shadow-lg">
                + New Contract
            </a>
        </div>

        <!-- Dynamic List Container Box -->
        <div id="contractsList" class="space-y-4">
            <div class="text-center py-12 bg-gray-800 border border-gray-700 rounded-2xl">
                <span class="animate-spin inline-block w-6 h-6 border-2 border-yellow-500 border-t-transparent rounded-full mb-2"></span>
                <p class="text-xs text-gray-400">Querying live contract data registry...</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const activeUser = localStorage.getItem('tradescrow_user_email');
        if (!activeUser) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userBadge').innerText = activeUser;
        }

        async function fetchUserContracts() {
            const listContainer = document.getElementById('contractsList');

            // Query trades where user email matches buyer OR seller fields
            const { data, error } = await supabaseClient
                .from('trade')
                .select('*')
                .or(`buyer_email.eq.${activeUser},seller_email.eq.${activeUser}`)
                .order('created_at', { ascending: false });

            if (error) {
                listContainer.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-xs text-center">Sync Error: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12 bg-gray-800 border border-gray-700 rounded-2xl px-4">
                        <p class="text-sm font-semibold text-gray-300">No active contracts found</p>
                        <p class="text-xs text-gray-500 mt-1 mb-4">You haven't initialized or joined any escrow deals yet.</p>
                        <a href="create.html" class="inline-block bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs px-4 py-2 rounded-xl border border-gray-600 transition">Create Your First Contract</a>
                    </div>`;
                return;
            }

            listContainer.innerHTML = ""; // Clear existing layout loader templates
            
            data.forEach(trade => {
                const isBuyer = trade.buyer_email.toLowerCase() === activeUser.toLowerCase();
                const roleBadge = isBuyer ? '<span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] uppercase font-bold px-2 py-0.5 rounded-md">Buyer</span>' : '<span class="bg-purple-500/10 text-purple-400 border border-purple-500/20 text-[10px] uppercase font-bold px-2 py-0.5 rounded-md">Seller</span>';
                
                let statusBadge = '';
                if(trade.status === 'pending') statusBadge = '<span class="text-yellow-500 font-medium">Awaiting Deposit</span>';
                if(trade.status === 'paid') statusBadge = '<span class="text-green-400 font-medium animate-pulse">🔒 Escrow Locked</span>';
                if(trade.status === 'released') statusBadge = '<span class="text-gray-400 font-medium">Settle Closed</span>';
                if(trade.status === 'disputed') statusBadge = '<span class="text-red-400 font-bold">🛑 Disputed Order</span>';

                const card = document.createElement('div');
                card.className = "bg-gray-800 border border-gray-700 rounded-2xl p-4 shadow-md hover:border-gray-600 transition cursor-pointer flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4";
                card.onclick = () => window.location.href = `room.html?id=${trade.id}`;
                
                card.innerHTML = `
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-white text-sm">${trade.asset_type}</h3>
                            ${roleBadge}
                        </div>
                        <p class="text-xs text-gray-400 font-mono break-all">Partner: ${isBuyer ? trade.seller_email : trade.buyer_email}</p>
                    </div>
                    <div class="flex sm:flex-col justify-between items-end w-full sm:w-auto border-t sm:border-0 border-gray-700/50 pt-2 sm:pt-0">
                        <span class="text-sm font-bold text-green-400">₦${trade.amount.toLocaleString()}</span>
                        <span class="text-xs">${statusBadge}</span>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function handleLogout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Run collection loops automatically at launch
        fetchUserContracts();
    </script>
</body>
</html>
