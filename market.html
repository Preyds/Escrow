<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-16">

    <!-- Navigation Header -->
    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-yellow-500 tracking-wide">🛒 P2P Marketplace</h1>
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="text-xs text-gray-400 hover:text-white font-medium bg-gray-900/50 border border-gray-700 px-3 py-1.5 rounded-xl transition">Dashboard</a>
                <button onclick="openNewListingModal()" class="bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold px-3 py-1.5 rounded-xl text-xs transition shadow-md">+ Sell Account</button>
            </div>
        </div>
    </nav>

    <!-- Platform Category Filters -->
    <div class="max-w-5xl mx-auto px-4 mt-6">
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none text-xs">
            <button onclick="filterPlatform('all')" class="bg-yellow-500 text-gray-950 font-bold px-4 py-2 rounded-xl whitespace-nowrap filter-btn">All Assets</button>
            <button onclick="filterPlatform('Instagram')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-4 py-2 rounded-xl whitespace-nowrap border border-gray-700 filter-btn">📸 Instagram</button>
            <button onclick="filterPlatform('TikTok')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-4 py-2 rounded-xl whitespace-nowrap border border-gray-700 filter-btn">🎵 TikTok</button>
            <button onclick="filterPlatform('Free Fire')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-4 py-2 rounded-xl whitespace-nowrap border border-gray-700 filter-btn">🎮 Free Fire</button>
            <button onclick="filterPlatform('YouTube')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium px-4 py-2 rounded-xl whitespace-nowrap border border-gray-700 filter-btn">📺 YouTube</button>
        </div>
    </div>

    <!-- Main Marketplace Grid -->
    <main class="max-w-5xl mx-auto px-4 mt-6">
        <div id="listingsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Loading Skeleton placeholder -->
            <div class="text-center py-12 col-span-full bg-gray-800 border border-gray-700 rounded-2xl">
                <span class="animate-spin inline-block w-6 h-6 border-2 border-yellow-500 border-t-transparent rounded-full mb-2"></span>
                <p class="text-xs text-gray-400">Loading active marketplace listings...</p>
            </div>
        </div>
    </main>

    <!-- POPUP MODAL: Create Advertisement Listing -->
    <div id="listingModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-md p-6 relative animate-pop space-y-4">
            <div>
                <h3 class="text-base font-bold text-white">Advertise Your Account</h3>
                <p class="text-xs text-gray-400">List your digital asset for public buyers to see.</p>
            </div>

            <form id="listingForm" onsubmit="handleCreateListing(event)" class="space-y-3.5 text-xs">
                <div>
                    <label class="block text-gray-400 mb-1 font-medium">Asset Platform</label>
                    <select id="assetPlatform" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-500 outline-none">
                        <option value="Instagram">Instagram Page</option>
                        <option value="TikTok">TikTok Account</option>
                        <option value="Free Fire">Free Fire ID</option>
                        <option value="YouTube">YouTube Channel</option>
                        <option value="Other">Other Asset</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1 font-medium">Short Title / Description</label>
                    <input type="text" id="assetTitle" placeholder="e.g., 50k active gaming page, level 70 max clothes" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-400 mb-1 font-medium">Price (₦ Naira)</label>
                        <input type="number" id="assetPrice" placeholder="50000" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1 font-medium">Contact WhatsApp/Telegram</label>
                        <input type="text" id="assetContact" placeholder="@username or phone" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1 font-medium">Your Contact Email (For Escrow)</label>
                    <input type="email" id="sellerEmail" placeholder="yourname@gmail.com" required class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white focus:border-yellow-500 outline-none">
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeNewListingModal()" class="w-1/2 bg-gray-700 hover:bg-gray-600 text-gray-200 py-3 rounded-xl font-bold transition">Cancel</button>
                    <button type="submit" class="w-1/2 bg-yellow-500 hover:bg-yellow-600 text-gray-950 py-3 rounded-xl font-bold transition">Post Advertisement</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeFilter = 'all';

        // Open/Close Modal Utilities
        function openNewListingModal() { document.getElementById('listingModal').classList.remove('hidden'); }
        function closeNewListingModal() { document.getElementById('listingModal').classList.add('hidden'); }

        // Fetch & Render Public Marketplace Listings
        async function fetchMarketplaceListings() {
            const gridContainer = document.getElementById('listingsGrid');
            
            // Note: Make sure to create a table named 'marketplace' in Supabase with these exact column handles
            let query = supabaseClient.from('marketplace').select('*').order('created_at', { ascending: false });
            
            if (activeFilter !== 'all') {
                query = query.eq('platform', activeFilter);
            }

            const { data, error } = await query;

            if (error) {
                gridContainer.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-xs text-center col-span-full">Database Sync Error: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                gridContainer.innerHTML = `
                    <div class="text-center py-12 bg-gray-800 border border-gray-700 rounded-2xl col-span-full px-4">
                        <p class="text-sm font-semibold text-gray-300">No listings available</p>
                        <p class="text-xs text-gray-500 mt-1">Be the first person to advertise an account for sale right now!</p>
                    </div>`;
                return;
            }

            gridContainer.innerHTML = "";

            data.forEach(item => {
                let badgeColor = "bg-gray-700 text-gray-300";
                if(item.platform === 'Instagram') badgeColor = "bg-pink-500/10 text-pink-400 border border-pink-500/20";
                if(item.platform === 'TikTok') badgeColor = "bg-teal-500/10 text-teal-400 border border-teal-500/20";
                if(item.platform === 'Free Fire') badgeColor = "bg-orange-500/10 text-orange-400 border border-orange-500/20";
                if(item.platform === 'YouTube') badgeColor = "bg-red-500/10 text-red-400 border border-red-500/20";

                const card = document.createElement('div');
                card.className = "bg-gray-800 border border-gray-700/70 rounded-2xl p-4 flex flex-col justify-between shadow-md hover:border-gray-600 transition";
                card.innerHTML = `
                    <div class="space-y-2.5">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider ${badgeColor}">${item.platform}</span>
                            <span class="text-xs text-gray-500 font-mono">${new Date(item.created_at).toLocaleDateString()}</span>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-white leading-snug break-words">${item.title}</h4>
                            <p class="text-[11px] text-gray-400 mt-1 font-mono break-all">Seller Email: ${item.seller_email}</p>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-t border-gray-700/50 flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-400">Handle/Contact: <strong class="text-yellow-500">${item.contact_handle}</strong></span>
                            <span class="text-sm font-extrabold text-green-400">₦${item.price.toLocaleString()}</span>
                        </div>
                        <a href="create.html?seller=${encodeURIComponent(item.seller_email)}&amount=${item.price}&type=${encodeURIComponent(item.platform)}" 
                           class="w-full mt-1 bg-gray-900 border border-gray-700 hover:bg-yellow-500 hover:text-gray-950 text-gray-300 text-center py-2 rounded-xl font-bold text-xs transition">
                           🔒 Deal via Escrow
                        </a>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // Handle Form Submission
        async function handleCreateListing(e) {
            e.preventDefault();
            
            const platform = document.getElementById('assetPlatform').value;
            const title = document.getElementById('assetTitle').value;
            const price = parseFloat(document.getElementById('assetPrice').value);
            const contact = document.getElementById('assetContact').value;
            const email = document.getElementById('sellerEmail').value;

            const { error } = await supabaseClient
                .from('marketplace')
                .insert([{ 
                    platform: platform, 
                    title: title, 
                    price: price, 
                    contact_handle: contact, 
                    seller_email: email 
                }]);

            if (error) {
                alert("Error posting ad: " + error.message);
                return;
            }

            document.getElementById('listingForm').reset();
            closeNewListingModal();
            fetchMarketplaceListings();
        }

        // Handle category tab filtering switching
        function filterPlatform(platform) {
            activeFilter = platform;
            
            // Visual toggle behavior for buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-yellow-500', 'text-gray-950', 'font-bold');
                btn.classList.add('bg-gray-800', 'text-gray-300', 'font-medium', 'border', 'border-gray-700');
            });
            
            event.target.classList.remove('bg-gray-800', 'text-gray-300', 'font-medium', 'border', 'border-gray-700');
            event.target.classList.add('bg-yellow-500', 'text-gray-950', 'font-bold');

            fetchMarketplaceListings();
        }

        // Initial Data Invocation
        fetchMarketplaceListings();
    </script>
</body>
</html>
