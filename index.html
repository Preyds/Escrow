<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-center items-center px-4 py-12">

    <div class="max-w-md w-full space-y-6">
        
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-yellow-500 tracking-wide">🎮 Tradescrow</h1>
                <p class="text-gray-400 text-sm mt-2">Decentralized P2P Account Escrow Portal</p>
            </div>

            <form id="loginForm" onsubmit="handleAuth(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Enter Your Email Address</label>
                    <input id="userEmail" type="email" required placeholder="name@example.com" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3.5 text-sm text-white focus:outline-none focus:border-yellow-500 transition">
                    <p class="text-[11px] text-gray-500 mt-1.5">No password required. This email tracks your buyer/seller smart contracts instantly.</p>
                </div>

                <button type="submit" id="authBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold py-3.5 px-4 rounded-xl shadow-lg transition duration-150 text-sm flex justify-center items-center gap-2">
                    Access Live Dashboard →
                </button>
            </form>
        </div>

        <div class="bg-gray-800/60 border border-gray-700/70 rounded-2xl p-5 shadow-lg">
            <h3 class="text-xs font-bold uppercase tracking-wider text-yellow-500 mb-3 flex items-center gap-2">
                📖 New to Tradescrow? Watch Tutorial
            </h3>
            
            <div class="relative w-full aspect-video rounded-xl overflow-hidden border border-gray-950 bg-gray-950 shadow-inner">
                <iframe 
                    class="absolute top-0 left-0 w-full h-full"
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    title="Tradescrow Platform Tutorial" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                 iframe>
            </div>
            
            <p class="text-[11px] text-gray-400 mt-2.5 leading-relaxed text-center">
                Learn how to initialize a contract, fund the escrow vault, and release payments safely in less than 60 seconds.
            </p>
        </div>

    </div>

    <script>
        <script>
        // 1. Setup Database Connection Info
        const supabaseUrl = "https://auxenvjsutqwuntfhsst.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI";
        
        // Initialize carefully handling different browser loading speeds
        const supabase = window.supabase ? window.supabase.createClient(supabaseUrl, supabaseAnonKey) : window.supabaseClient.createClient(supabaseUrl, supabaseAnonKey);

        // 2. Handle Login When Form is Submitted
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents phone browser from breaking/reloading page
            
            const emailInput = document.getElementById('userEmail').value.trim().toLowerCase();
            const authBtn = document.getElementById('authBtn');

            // Set button to loading state immediately
            authBtn.disabled = true;
            authBtn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full"></span> Sending Link...`;

            try {
                // Request Passwordless OTP Magic Link from Supabase
                const { data, error } = await supabase.auth.signInWithOtp({
                    email: emailInput,
                    options: {
                        // Tells Supabase where to redirect the user after clicking the link
                        emailRedirectTo: window.location.origin + '/dashboard.html'
                    }
                });

                if (error) {
                    alert("🔒 Supabase Error: " + error.message);
                    authBtn.disabled = false;
                    authBtn.innerText = "Access Live Dashboard →";
                } else {
                    alert("📬 Check your Gmail app! A secure login link has been sent to your inbox.");
                    authBtn.innerText = "Check Your Gmail Inbox...";
                }
            } catch (err) {
                alert("Connection error: " + err.message);
                authBtn.disabled = false;
                authBtn.innerText = "Access Live Dashboard →";
            }
        });
    </script>

</body>
</html>
