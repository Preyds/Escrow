<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Initialize Deal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-yellow-500 tracking-wide">🎮 Tradescrow</h1>
            <span class="text-xs bg-yellow-500/10 text-yellow-400 font-bold px-2.5 py-1 rounded-full border border-yellow-500/20">P2P Escrow Engine</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 mt-8">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-extrabold text-white">Create Account Exchange Contract</h2>
            <p class="text-gray-400 text-sm mt-1">Safely trade gaming handles, social profiles, and digital assets.</p>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-xl">
            <form id="escrowForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Asset Type</label>
                    <select id="assetType" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
                        <option value="Gaming Account">Gaming Account (Free Fire, CODM, etc.)</option>
                        <option value="Instagram">Instagram Profile</option>
                        <option value="TikTok">TikTok Account</option>
                        <option value="Facebook">Facebook Page/Profile</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Trade Amount (NGN / ₦)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-500 font-medium">₦</span>
                        <input id="tradeAmount" type="number" required placeholder="5,000" class="w-full bg-gray-950 border border-gray-700 rounded-xl pl-9 pr-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
                    </div>
                    <div class="mt-2 text-xs text-gray-400 flex justify-between px-1">
    <span>Escrow Fee (2%): <span id="feeDisplay" class="text-gray-300 font-medium">₦0</span></span>
    <span>Total to Pay: <span id="totalDisplay" class="text-green-400 font-bold">₦0</span></span>
                    </div>
                    
                </div>

                <div class="grid grid-cols-2 gap-4">
                
    <div class="grid grid-cols-2 gap-4">
    <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Your Email</label>
        <input id="userEmail" type="email" required placeholder="your@email.com" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
    </div>
    <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Partner's Email</label>
        <input id="peerContact" type="email" required placeholder="trader@mail.com" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
    </div>
</div>

<div class="mt-4">
    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Your Role</label>
    <select id="userRole" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-500 transition">
        <option value="buyer">I am the Buyer</option>
        <option value="seller">I am the Seller</option>
    </select>
</div>
                        
           
         </div>

                <button id="submitBtn" type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold py-3.5 px-4 rounded-xl shadow-lg transform active:scale-95 transition duration-150 mt-4 flex justify-center items-center gap-2">
                    Initialize Escrow Deal
                </button>
            </form>
        </div>
    </main>

    <script>
        // PASTE YOUR SUPABASE CREDENTIALS HERE
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// A completely safe, cross-platform string generator
function generateSimpleId() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 12; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full"></span> Creating Contract...`;
            
            const asset = document.getElementById('assetType').value;
            const amount = parseInt(document.getElementById('tradeAmount').value);
            const peerEmail = document.getElementById('peerContact').value;
            const userRole = document.getElementById('userRole').value;
            
            const buyerEmail = (userRole === 'buyer') ? 'admin@tradescrow.com' : peerEmail;
            const sellerEmail = (userRole === 'seller') ? 'admin@tradescrow.com' : peerEmail;

            // Save deal to Supabase
            const { data, error } = await supabaseClient
                .from('trade')
                .insert([
                    { 
                        asset_type: asset, 
                        amount: amount, 
                        status: 'pending', 
                        buyer_email: buyerEmail, 
                        seller_email: sellerEmail 
                    }
                ])
                .select();

            if (error) {
                alert('Database Error: ' + error.message);
                btn.disabled = false;
                btn.innerText = 'Initialize Escrow Deal';
                return;
            }

            // Redirect user directly to the live Tracking Deal Room page with the database ID in the link
            const newTradeId = data[0].id;
            window.location.href = `trade.html?id=${newTradeId}`;
        }
        const amountInput = document.getElementById('amount'); // Match your amount input ID
const feeDisplay = document.getElementById('feeDisplay');
const totalDisplay = document.getElementById('totalDisplay');

amountInput.addEventListener('input', () => {
    const amount = parseFloat(amountInput.value) || 0;
    
    // Calculate a 2% fee (Change 0.02 to 0.05 if you want a 5% fee instead)
    const escrowFee = amount * 0.02; 
    const totalAmount = amount + escrowFee;

    // Display formatted values to the user
    feeDisplay.innerText = `₦${escrowFee.toLocaleString()}`;
    totalDisplay.innerText = `₦${totalAmount.toLocaleString()}`;
});
        
    </script>
</body>
</html>
