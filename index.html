<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow // Next-Gen Escrow Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .tech-mono {
            font-family: 'Share Tech Mono', monospace;
        }
        
        /* Smooth tactile hover glow */
        .glow-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glow-hover:hover {
            border-color: rgba(234, 179, 8, 0.4);
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.08);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-[#060609] text-gray-200 min-h-screen flex flex-col justify-between overflow-x-hidden relative selection:bg-yellow-500 selection:text-black">

    <!-- Subtle Ambient glow (Behind elements) -->
    <div class="absolute -top-40 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-yellow-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- CLEAN NAVIGATION -->
    <nav class="w-full max-w-4xl mx-auto px-6 py-6 flex justify-between items-center relative z-20 border-b border-gray-900/60">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>
            <span class="tech-mono text-xs tracking-widest text-yellow-500 uppercase font-bold">TRADESCROW // ACTIVE</span>
        </div>
        <div class="flex items-center gap-6 text-[10px] tracking-widest text-gray-500 uppercase tech-mono">
            <a href="market.html" class="hover:text-yellow-500 transition duration-300">Marketplace</a>
        </div>
    </nav>

    <!-- PORTAL ACCESS PANEL -->
    <main class="flex-grow flex items-center justify-center relative z-10 px-6 py-12">
        
        <div class="w-full max-w-md bg-[#0c0d12]/90 backdrop-blur-xl border border-gray-900 rounded-3xl p-8 md:p-10 glow-hover relative">
            <div class="absolute top-4 left-4 tech-mono text-[8px] text-gray-600">[ TRD_GATEWAY ]</div>
            
            <div class="space-y-6 text-center">
                <!-- Status/Icon Indicator -->
                <div id="statusIcon" class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-2xl transition-all duration-300">
                    🔒
                </div>

                <div class="space-y-2">
                    <h2 class="text-2xl font-black text-white tracking-tight uppercase">
                        Secure Access
                    </h2>
                    <p class="text-[10px] text-yellow-500 tracking-widest uppercase font-bold tech-mono">
                        Passwordless Security Tunnel
                    </p>
                </div>

                <!-- Live Supabase Login Form -->
                <form id="loginForm" class="space-y-4 text-left pt-2">
                    <div class="relative">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 tech-mono">
                            // ENTER ACCOUNT EMAIL
                        </label>
                        <input id="emailInput" type="email" placeholder="name@example.com" required 
                            class="w-full bg-[#050508]/80 border border-gray-900 focus:border-yellow-500/60 rounded-2xl py-4 px-5 text-sm text-white placeholder-gray-700 outline-none transition duration-300 tech-mono">
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black uppercase text-xs tracking-widest py-4 rounded-2xl transition duration-300 shadow-lg shadow-yellow-500/5 flex justify-center items-center gap-2">
                        <span id="btnText">Request Login Key</span>
                        <span id="btnArrow">[→]</span>
                    </button>
                </form>

                <!-- Status Feedback Overlay Messages -->
                <div id="feedbackMessage" class="hidden text-xs py-3 px-4 rounded-xl tech-mono text-center"></div>

                <p class="text-[10px] text-gray-600">
                    * A one-time secure login token link will be instantly dispatched to your inbox.
                </p>
            </div>
        </div>

    </main>

    <!-- FOOTER TECHNICAL BAR -->
    <footer class="w-full max-w-4xl mx-auto px-6 py-6 border-t border-gray-900/60 relative z-20 flex justify-between items-center text-[10px] tech-mono text-gray-600">
        <span class="text-yellow-500/40">// AES_256 SECURED</span>
        <span>© 2026 TRADESCROW</span>
    </footer>

    <!-- SUPABASE SECURITY LOGIC -->
    <script>
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudFFoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnArrow = document.getElementById('btnArrow');
        const feedbackMessage = document.getElementById('feedbackMessage');
        const statusIcon = document.getElementById('statusIcon');

        // Check if user is already signed in on page load
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkSession();

        // Handle OTP request
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!email) return;

            // Trigger sleek Loading Animation on the submit button
            submitBtn.disabled = true;
            btnText.innerText = "Authorizing Security Link...";
            btnArrow.innerHTML = `<span class="animate-spin inline-block w-3.5 h-3.5 border-2 border-black border-t-transparent rounded-full"></span>`;
            statusIcon.innerHTML = "🔑";
            statusIcon.classList.add('animate-pulse');

            try {
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email: email,
                    options: {
                        emailRedirectTo: window.location.origin + '/dashboard.html'
                    }
                });

                feedbackMessage.classList.remove('hidden', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');

                if (error) {
                    // Micro-interaction error style
                    feedbackMessage.className = "text-xs py-3 px-4 rounded-xl tech-mono text-center bg-red-500/10 text-red-400 border border-red-500/20 mt-2";
                    feedbackMessage.innerText = `[ ERROR: ${error.message} ]`;
                    statusIcon.innerHTML = "❌";
                    statusIcon.classList.remove('animate-pulse');
                    resetBtn();
                } else {
                    // Success Micro-interaction transition
                    feedbackMessage.className = "text-xs py-3 px-4 rounded-xl tech-mono text-center bg-green-500/10 text-green-400 border border-green-500/20 mt-2";
                    feedbackMessage.innerText = "✓ Check your email inbox! We sent you an encrypted link.";
                    statusIcon.innerHTML = "✉️";
                    statusIcon.classList.remove('animate-pulse');
                    loginForm.reset();
                    resetBtn(true);
                }
            } catch (err) {
                feedbackMessage.className = "text-xs py-3 px-4 rounded-xl tech-mono text-center bg-red-500/10 text-red-400 border border-red-500/20 mt-2";
                feedbackMessage.innerText = `[ EXCEPTION: ${err.message} ]`;
                resetBtn();
            }
        });

        function resetBtn(success = false) {
            submitBtn.disabled = false;
            btnText.innerText = success ? "Request Sent Successfully" : "Request Login Key";
            btnArrow.innerText = "[→]";
        }
    </script>
</body>
</html>
