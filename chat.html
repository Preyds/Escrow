<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradescrow - Global Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Chess Libraries & Styling -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- Header Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold text-yellow-500 tracking-wide">💬 Global Hub Chat</h1>
                <button onclick="toggleGameDrawer()" class="text-xs bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-3 py-1 rounded-full font-bold hover:bg-yellow-500/20 transition flex items-center gap-1">
                    🎮 Mini Games
                </button>
            </div>
            <span id="liveBadge" class="text-[10px] bg-green-500/10 text-green-400 border border-green-500/20 px-2.5 py-0.5 rounded-full font-bold">Connecting Pipeline...</span>
        </div>
    </nav>

    <!-- Mini-Game Drawer Section -->
    <div id="gameDrawer" class="hidden max-w-4xl mx-auto w-full px-4 mt-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-4 shadow-2xl relative">
            
            <!-- Game Selector Tabs -->
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-3">
                <div class="flex gap-2">
                    <button id="tabTicTacToe" onclick="switchGame('tictactoe')" class="text-xs font-bold px-3 py-1.5 rounded-lg bg-yellow-500 text-gray-950 transition">❌ Tic-Tac-Toe</button>
                    <button id="tabChess" onclick="switchGame('chess')" class="text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-700 text-gray-300 hover:text-white transition">♟️ Chess</button>
                </div>
                <button onclick="resetCurrentGame()" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 font-semibold px-2.5 py-1 rounded-lg transition">Restart Game</button>
            </div>

            <!-- TIC-TAC-TOE VIEW -->
            <div id="tictactoeView">
                <div id="gameStatus" class="text-xs text-center text-gray-400 mb-3 font-medium">Player X's turn</div>
                <div class="grid grid-cols-3 gap-2 max-w-[200px] mx-auto">
                    <button onclick="makeMove(0)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(1)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(2)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(3)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(4)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(5)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(6)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(7)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                    <button onclick="makeMove(8)" class="game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition"></button>
                </div>
            </div>

            <!-- CHESS VIEW -->
            <div id="chessView" class="hidden flex flex-col items-center">
                <div id="chessStatus" class="text-xs text-center text-yellow-400 mb-3 font-semibold">White to move</div>
                <div id="chessBoard" class="w-[280px] sm:w-[320px] rounded-lg overflow-hidden border-2 border-gray-700"></div>
            </div>

        </div>
    </div>

    <!-- Internal Routing Tabs Layout -->
    <div class="max-w-4xl mx-auto w-full px-4 mt-4 grid grid-cols-2 gap-2">
        <a href="dashboard.html" class="bg-gray-800/50 hover:bg-gray-800 text-gray-400 text-center py-2.5 rounded-xl font-bold text-xs border border-gray-700 transition">💼 My Escrow Trades</a>
        <a href="chat.html" class="bg-gray-800 border border-yellow-500/30 text-yellow-500 text-center py-2.5 rounded-xl font-bold text-xs shadow-md">💬 Global Hub Chat</a>
    </div>

    <!-- Live Messenger Communication container wrapper -->
    <main class="flex-1 max-w-4xl mx-auto w-full px-4 my-4 flex flex-col justify-between overflow-hidden">
        <div id="globalChatWindow" class="flex-1 bg-gray-950 border border-gray-800 rounded-2xl p-4 overflow-y-auto space-y-4 mb-4 h-[calc(100vh-240px)] flex flex-col">
            <p class="text-gray-600 text-xs text-center my-auto">Initializing universal global connection sync streams...</p>
        </div>

        <!-- Image Upload Preview Banner -->
        <div id="imagePreviewContainer" class="hidden mb-2 p-2 bg-gray-800 border border-gray-700 rounded-xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img id="imagePreview" src="" class="w-12 h-12 object-cover rounded-lg border border-gray-600" />
                <span class="text-xs text-gray-300 font-medium truncate max-w-[200px]" id="previewFileName">image.png</span>
            </div>
            <button type="button" onclick="clearSelectedImage()" class="text-gray-400 hover:text-red-400 text-sm font-bold p-1">✕</button>
        </div>

        <!-- Chat Input Action Form Section -->
        <form id="globalChatForm" onsubmit="sendGlobalMessage(event)" class="flex gap-2 items-center">
            <!-- File Input & Attachment Button -->
            <label class="cursor-pointer bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 text-gray-400 hover:text-white transition flex items-center justify-center">
                📷
                <input id="imageFileInput" type="file" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
            </label>

            <input id="globalInput" type="text" placeholder="Ask a question or find traders safely..." class="flex-1 bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-yellow-500 transition">
            
            <button id="sendBtn" type="submit" class="bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold px-6 py-3 rounded-xl text-sm transition flex items-center gap-2">
                <span>Send</span>
            </button>
        </form>
    </main>

    <!-- Image Lightbox Modal -->
    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 cursor-pointer" onclick="closeLightbox()">
        <img id="lightboxImg" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl object-contain">
    </div>

    <script>
        const SUPABASE_URL = 'https://auxenvjsutqwuntfhsst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1eGVudmpzdXRxd3VudGZoc3N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE1MjUsImV4cCI6MjA5NTEwNzUyNX0.ybdyD3MAMbHMeCK9Li6hbXQ9v7FtQVV4SblSxSrkxYI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const activeUser = localStorage.getItem('tradescrow_user_email');
        if (!activeUser) {
            window.location.href = 'index.html';
        }

        let selectedImageFile = null;

        // Image Handling
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                alert("File size exceeds 5MB limit.");
                return;
            }

            selectedImageFile = file;
            document.getElementById('previewFileName').innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearSelectedImage() {
            selectedImageFile = null;
            document.getElementById('imageFileInput').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        async function uploadImageToSupabase(file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
            const filePath = `chat_uploads/${fileName}`;

            const { data, error } = await supabaseClient
                .storage
                .from('chat_images')
                .upload(filePath, file);

            if (error) {
                console.error('Storage upload error:', error.message);
                throw error;
            }

            const { data: publicData } = supabaseClient
                .storage
                .from('chat_images')
                .getPublicUrl(filePath);

            return publicData.publicUrl;
        }

        async function loadGlobalHistory() {
            const chatBox = document.getElementById('globalChatWindow');
            
            const { data, error } = await supabaseClient
                .from('global_messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(70);

            if (error) {
                chatBox.innerText = "Error syncing messages: " + error.message;
                return;
            }

            chatBox.innerHTML = "";
            if (data && data.length > 0) {
                data.forEach(msg => renderMessageRow(msg));
            } else {
                chatBox.innerHTML = `<p class="text-gray-600 text-xs text-center my-auto">Welcome to the hub! Type a message below to start the conversation.</p>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderMessageRow(msg) {
            const chatBox = document.getElementById('globalChatWindow');
            if (chatBox.querySelector('.text-gray-600')) chatBox.innerHTML = "";

            const isMe = msg.sender_email.toLowerCase() === activeUser.toLowerCase();
            const msgBubble = document.createElement('div');
            
            msgBubble.className = `max-w-[85%] p-3 rounded-xl text-xs flex flex-col space-y-2 ${
                isMe ? 'bg-yellow-500/10 text-gray-200 ml-auto border border-yellow-500/20' : 'bg-gray-900 border border-gray-800 text-gray-200'
            }`;

            let imageHtml = '';
            if (msg.image_url) {
                imageHtml = `<img src="${msg.image_url}" onclick="openLightbox('${msg.image_url}')" class="max-h-52 rounded-lg object-cover cursor-pointer hover:opacity-90 transition border border-gray-700/50 my-1" alt="Chat attachment" />`;
            }

            msgBubble.innerHTML = `
                <div class="flex justify-between items-center gap-6 font-mono text-[10px] text-gray-500">
                    <span class="font-bold text-gray-400 break-all">${msg.sender_email}</span>
                    <span>${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                ${imageHtml}
                ${msg.message_text ? `<p class="font-sans leading-relaxed break-all">${msg.message_text}</p>` : ''}
            `;
            chatBox.appendChild(msgBubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendGlobalMessage(e) {
            e.preventDefault();
            const input = document.getElementById('globalInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = input.value.trim();
            
            if (!text && !selectedImageFile) return;

            sendBtn.disabled = true;
            sendBtn.innerHTML = `<span class="animate-spin text-xs">⏳</span>`;

            let imageUrl = null;

            try {
                if (selectedImageFile) {
                    imageUrl = await uploadImageToSupabase(selectedImageFile);
                }

                input.value = "";
                clearSelectedImage();

                await supabaseClient.from('global_messages').insert([{
                    sender_email: activeUser,
                    message_text: text || '',
                    image_url: imageUrl
                }]);
            } catch (err) {
                alert("Failed to send message: " + err.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<span>Send</span>`;
            }
        }

        function listenToRealtimeChat() {
            const liveBadge = document.getElementById('liveBadge');
            liveBadge.innerText = "Connecting...";

            const chatChannel = supabaseClient
                .channel('any-name-global-stream')
                .on(
                    'postgres_changes', 
                    { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'global_messages'
                    }, 
                    (payload) => {
                        renderMessageRow(payload.new);
                    }
                )
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        liveBadge.className = "text-[10px] bg-green-500/10 text-green-400 border border-green-500/20 px-2.5 py-0.5 rounded-full font-bold";
                        liveBadge.innerText = "● Hub Connected";
                    } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
                        liveBadge.className = "text-[10px] bg-red-500/10 text-red-400 border border-red-500/20 px-2.5 py-0.5 rounded-full font-bold";
                        liveBadge.innerText = "Disconnected";
                    }
                });
        }

        // Lightbox Functions
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }

        // --- MINI GAMES ENGINE ---
        let currentSelectedGame = 'tictactoe';

        function toggleGameDrawer() {
            const drawer = document.getElementById('gameDrawer');
            drawer.classList.toggle('hidden');
            if (!drawer.classList.contains('hidden') && currentSelectedGame === 'chess' && !chessBoardInstance) {
                initChessBoard();
            }
        }

        function switchGame(game) {
            currentSelectedGame = game;
            const ttBtn = document.getElementById('tabTicTacToe');
            const chessBtn = document.getElementById('tabChess');
            const ttView = document.getElementById('tictactoeView');
            const chessView = document.getElementById('chessView');

            if (game === 'tictactoe') {
                ttBtn.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-yellow-500 text-gray-950 transition";
                chessBtn.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-700 text-gray-300 hover:text-white transition";
                ttView.classList.remove('hidden');
                chessView.classList.add('hidden');
            } else {
                chessBtn.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-yellow-500 text-gray-950 transition";
                ttBtn.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-700 text-gray-300 hover:text-white transition";
                chessView.classList.remove('hidden');
                ttView.classList.add('hidden');
                
                if (!chessBoardInstance) {
                    setTimeout(initChessBoard, 100);
                }
            }
        }

        function resetCurrentGame() {
            if (currentSelectedGame === 'tictactoe') {
                resetTicTacToe();
            } else {
                resetChess();
            }
        }

        // 1. Tic-Tac-Toe Logic
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        function makeMove(index) {
            if (gameState[index] !== "" || !gameActive) return;

            gameState[index] = currentPlayer;
            const cells = document.querySelectorAll('.game-cell');
            cells[index].innerText = currentPlayer;
            cells[index].classList.add(currentPlayer === 'X' ? 'text-yellow-400' : 'text-blue-400');

            checkGameResult();
        }

        function checkGameResult() {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];

            let won = false;
            for (let condition of winPatterns) {
                let a = gameState[condition[0]];
                let b = gameState[condition[1]];
                let c = gameState[condition[2]];
                if (a === '' || b === '' || c === '') continue;
                if (a === b && b === c) {
                    won = true;
                    break;
                }
            }

            if (won) {
                document.getElementById('gameStatus').innerText = `🎉 Player ${currentPlayer} Wins!`;
                document.getElementById('gameStatus').className = "text-xs text-center text-green-400 font-bold mb-3";
                gameActive = false;
                return;
            }

            if (!gameState.includes("")) {
                document.getElementById('gameStatus').innerText = "🤝 Game Draw!";
                document.getElementById('gameStatus').className = "text-xs text-center text-yellow-400 font-bold mb-3";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById('gameStatus').innerText = `Player ${currentPlayer}'s turn`;
        }

        function resetTicTacToe() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;
            document.getElementById('gameStatus').innerText = "Player X's turn";
            document.getElementById('gameStatus').className = "text-xs text-center text-gray-400 mb-3 font-medium";
            document.querySelectorAll('.game-cell').forEach(cell => {
                cell.innerText = "";
                cell.className = "game-cell h-16 bg-gray-950 border border-gray-700 rounded-xl text-xl font-bold text-white hover:bg-gray-900 transition";
            });
        }

        // 2. Chess Logic Engine
        let chessGame = null;
        let chessBoardInstance = null;

        function initChessBoard() {
            chessGame = new Chess();
            
            const config = {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };

            chessBoardInstance = Chessboard('chessBoard', config);
            updateChessStatus();
        }

        function onDragStart(source, piece, position, orientation) {
            if (chessGame.game_over()) return false;
            if ((chessGame.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (chessGame.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            const move = chessGame.move({
                from: source,
                to: target,
                promotion: 'q' // Auto-promote to queen for simplicity
            });

            if (move === null) return 'snapback';
            updateChessStatus();
        }

        function onSnapEnd() {
            chessBoardInstance.position(chessGame.fen());
        }

        function updateChessStatus() {
            let status = '';
            let moveColor = chessGame.turn() === 'w' ? 'White' : 'Black';

            if (chessGame.in_checkmate()) {
                status = `🎉 Game over, ${moveColor} is in checkmate!`;
            } else if (chessGame.in_draw()) {
                status = '🤝 Game over, drawn position!';
            } else {
                status = `${moveColor} to move`;
                if (chessGame.in_check()) {
                    status += `, ⚠️ ${moveColor} is in check!`;
                }
            }

            document.getElementById('chessStatus').innerText = status;
        }

        function resetChess() {
            if (chessGame && chessBoardInstance) {
                chessGame.reset();
                chessBoardInstance.start();
                updateChessStatus();
            }
        }

        // Initialize execution sequencing run
        loadGlobalHistory();
        listenToRealtimeChat();
    </script>
</body>
</html>
